<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>こころとからだの診断｜京都伝統中医学研究所</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #1a1410;
    --deep: #0f1923;
    --indigo: #1e2d4a;
    --gold: #c9973a;
    --gold-light: #e8c06a;
    --washi: #f5f0e8;
    --washi-dark: #e8e0d0;
    --red: #8b2020;
    --muted: #8a7f72;
    --white: #fdfaf5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif JP', serif;
    background: var(--deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(30,45,74,0.8) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,32,32,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(201,151,58,0.1) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* 装飾的な和柄背景 */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(201,151,58,0.03) 40px,
        rgba(201,151,58,0.03) 41px
      );
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    display: none;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 16px;
    animation: fadeIn 0.5s ease;
  }
  .screen.active { display: flex; flex-direction: column; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(-30px); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .card {
    background: var(--washi);
    border-radius: 16px;
    padding: 36px 28px;
    box-shadow:
      0 0 0 1px rgba(201,151,58,0.2),
      0 20px 60px rgba(0,0,0,0.5),
      0 4px 12px rgba(0,0,0,0.3);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
  }

  /* ── スタート画面 ── */
  #screen-start .card {
    text-align: center;
    padding: 48px 32px;
  }

  .emblem {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    background: rgba(201,151,58,0.08);
    position: relative;
  }

  .emblem::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201,151,58,0.3);
    border-radius: 50%;
  }

  .site-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .title-main {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .title-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 28px;
  }

  .intro-text {
    font-size: 13px;
    color: #5a5248;
    line-height: 2;
    text-align: left;
    background: rgba(201,151,58,0.06);
    border-left: 2px solid var(--gold);
    padding: 16px 20px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 28px;
  }

  .info-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
  }

  .info-item {
    text-align: center;
  }

  .info-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    color: var(--gold);
    font-weight: 700;
    line-height: 1;
  }

  .info-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── ボタン ── */
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #1e2d4a, #2a3f6a);
    color: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: 8px;
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,151,58,0.1), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-primary:hover::after { opacity: 1; }
  .btn-primary:hover { box-shadow: 0 0 20px rgba(201,151,58,0.3); }
  .btn-primary:active { transform: scale(0.98); }

  /* ── 診断画面 ── */
  .progress-area {
    margin-bottom: 16px;
    padding: 0 4px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label {
    font-size: 10px;
    color: rgba(245,240,232,0.5);
    letter-spacing: 2px;
  }

  .progress-count {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    color: var(--gold);
  }

  .progress-bar-bg {
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .block-badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--gold);
    border: 1px solid rgba(201,151,58,0.4);
    padding: 3px 10px;
    border-radius: 12px;
    margin-bottom: 20px;
  }

  .question-empathy {
    font-family: 'Shippori Mincho', serif;
    font-size: 17px;
    color: var(--ink);
    line-height: 1.8;
    margin-bottom: 14px;
    font-weight: 500;
  }

  .question-divider {
    width: 32px;
    height: 1px;
    background: var(--gold);
    margin: 0 0 14px 0;
    opacity: 0.5;
  }

  .question-ask {
    font-size: 13px;
    color: #6a5f52;
    line-height: 1.8;
    margin-bottom: 28px;
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    padding: 14px 20px;
    background: white;
    border: 1.5px solid #ddd5c8;
    border-radius: 10px;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: #4a3f35;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid #c0b8ae;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option-btn:hover {
    border-color: var(--gold);
    background: rgba(201,151,58,0.05);
  }

  .option-btn:hover .option-dot {
    border-color: var(--gold);
    background: rgba(201,151,58,0.3);
  }

  .option-btn.selected {
    border-color: var(--indigo);
    background: rgba(30,45,74,0.06);
  }

  .option-btn.selected .option-dot {
    background: var(--indigo);
    border-color: var(--indigo);
  }

  .female-note {
    font-size: 10px;
    color: #a0907e;
    margin-top: -8px;
    margin-bottom: 16px;
    padding: 8px 12px;
    background: rgba(139,32,32,0.05);
    border-radius: 6px;
    border-left: 2px solid rgba(139,32,32,0.3);
  }

  .nav-area {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-back {
    padding: 14px 20px;
    background: transparent;
    border: 1px solid rgba(245,240,232,0.2);
    color: rgba(245,240,232,0.5);
    border-radius: 8px;
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-back:hover {
    border-color: rgba(245,240,232,0.5);
    color: rgba(245,240,232,0.8);
  }

  .btn-next {
    flex: 1;
    padding: 14px;
    background: linear-gradient(135deg, #1e2d4a, #2a3f6a);
    color: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: 8px;
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-next:hover { box-shadow: 0 0 16px rgba(201,151,58,0.3); }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── 結果画面 ── */
  #screen-result {
    max-height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .result-header {
    text-align: center;
    margin-bottom: 20px;
  }

  .result-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    color: var(--white);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .result-subtitle {
    font-size: 11px;
    color: rgba(245,240,232,0.4);
    letter-spacing: 2px;
  }

  .result-section {
    margin-bottom: 16px;
  }

  .result-section-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .result-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,151,58,0.2);
  }

  .rank-card {
    background: var(--washi);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border: 1px solid rgba(201,151,58,0.15);
    cursor: pointer;
    transition: all 0.2s;
  }

  .rank-card:hover {
    transform: translateX(4px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .rank-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 28px;
    color: var(--gold);
    line-height: 1;
    min-width: 32px;
    text-align: center;
  }

  .rank-num.first { color: #c9973a; }
  .rank-num.second { color: #9a9a9a; }
  .rank-num.third { color: #8b6535; }

  .rank-info { flex: 1; }

  .rank-type {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    color: var(--ink);
    font-weight: 700;
    margin-bottom: 4px;
  }

  .rank-desc {
    font-size: 11px;
    color: #7a6f62;
    line-height: 1.6;
  }

  .rank-bar-wrap {
    width: 50px;
    text-align: center;
  }

  .rank-score-label {
    font-size: 9px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .rank-bar-bg {
    width: 6px;
    height: 50px;
    background: #e0d8cc;
    border-radius: 3px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  .rank-bar-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, var(--indigo), #3a5a9a);
    border-radius: 3px;
    transition: height 1s ease;
  }

  .rank-bar-fill.first { background: linear-gradient(to top, var(--gold), var(--gold-light)); }

  .goshin-card {
    background: var(--washi);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border: 1px solid rgba(139,32,32,0.15);
    cursor: pointer;
    transition: all 0.2s;
  }

  .goshin-card:hover { transform: translateX(4px); }

  .goshin-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(139,32,32,0.08);
    border: 1px solid rgba(139,32,32,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .goshin-name {
    font-family: 'Shippori Mincho', serif;
    font-size: 20px;
    color: var(--ink);
    font-weight: 700;
    margin-bottom: 4px;
  }

  .goshin-organ {
    font-size: 11px;
    color: var(--red);
    margin-bottom: 3px;
  }

  .goshin-desc {
    font-size: 11px;
    color: #7a6f62;
    line-height: 1.6;
  }

  .result-message {
    background: rgba(30,45,74,0.6);
    border: 1px solid rgba(201,151,58,0.2);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    text-align: center;
  }

  .result-message p {
    font-size: 13px;
    color: rgba(245,240,232,0.7);
    line-height: 2;
  }

  .btn-detail {
    display: block;
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 8px;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    text-align: center;
    margin-bottom: 10px;
    text-decoration: none;
    transition: all 0.3s;
  }

  .btn-detail:hover { background: rgba(201,151,58,0.1); }

  .btn-retry {
    display: block;
    width: 100%;
    padding: 14px;
    background: transparent;
    border: none;
    color: rgba(245,240,232,0.3);
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    text-decoration: underline;
  }

  /* アニメーション */
  .card.slide-out { animation: slideOut 0.3s ease forwards; }
  .card.slide-in { animation: slideIn 0.3s ease forwards; }

  /* スクロールバー */
  #screen-result::-webkit-scrollbar { width: 4px; }
  #screen-result::-webkit-scrollbar-track { background: transparent; }
  #screen-result::-webkit-scrollbar-thumb { background: rgba(201,151,58,0.3); border-radius: 2px; }
</style>
</head>
<body>

<!-- ① スタート画面 -->
<div id="screen-start" class="screen active">
  <div class="card">
    <div class="emblem">☯</div>
    <div class="site-label">京都伝統中医学研究所</div>
    <div class="title-main">こころとからだの<br>統合診断</div>
    <div class="title-sub">五神 × 八体質 完全診断</div>
    <div class="intro-text">
      あなたのからだとこころは、いまどんな状態でしょうか。<br>
      中医学の叡智をもとに設計された35の問いが、<br>
      あなたの「体質の傾向」と「五神のバランス」を<br>
      静かに、深く、照らし出します。
    </div>
    <div class="info-row">
      <div class="info-item">
        <div class="info-num">35</div>
        <div class="info-label">問</div>
      </div>
      <div class="info-item">
        <div class="info-num">5〜8</div>
        <div class="info-label">分</div>
      </div>
      <div class="info-item">
        <div class="info-num">8+5</div>
        <div class="info-label">体質×五神</div>
      </div>
    </div>
    <button class="btn-primary" onclick="startDiagnosis()">診断をはじめる</button>
  </div>
</div>

<!-- ② 診断画面 -->
<div id="screen-quiz" class="screen">
  <div class="progress-area">
    <div class="progress-header">
      <span class="progress-label">DIAGNOSIS</span>
      <span class="progress-count" id="progress-count">1 / 35</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
  </div>
  <div class="card" id="question-card">
    <div class="block-badge" id="block-badge">BLOCK A — からだの声</div>
    <div class="question-empathy" id="q-empathy"></div>
    <div class="question-divider"></div>
    <div class="question-ask" id="q-ask"></div>
    <div id="female-note" class="female-note" style="display:none">
      ※ 生理のある女性の方のみお答えください
    </div>
    <div class="options-grid" id="options-grid"></div>
  </div>
  <div class="nav-area">
    <button class="btn-back" id="btn-back" onclick="prevQuestion()">◁ 戻る</button>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>次へ ▷</button>
  </div>
</div>

<!-- ③ 結果画面 -->
<div id="screen-result" class="screen">
  <div class="result-header">
    <div class="result-title">診断結果</div>
    <div class="result-subtitle">あなたのこころとからだの傾向</div>
  </div>

  <div class="result-section">
    <div class="result-section-title">からだの体質傾向 TOP 3</div>
    <div id="taishitsu-results"></div>
  </div>

  <div class="result-section">
    <div class="result-section-title">こころの五神傾向 TOP 2</div>
    <div id="goshin-results"></div>
  </div>

  <div class="result-message">
    <p id="result-message-text"></p>
  </div>

  <a href="#" class="btn-detail" id="btn-detail1">第1位の体質について詳しく見る →</a>
  <a href="#" class="btn-detail" id="btn-detail2">第2位の体質について詳しく見る →</a>
  <button class="btn-retry" onclick="resetDiagnosis()">もう一度診断する</button>
</div>

<script>
// ══════════════════════════════════════════
// 質問データ（体質×五神スコアリング付き）
// ══════════════════════════════════════════
const questions = [
  // BLOCK A：からだの声
  {
    block: "BLOCK A — からだの声",
    empathy: "目が覚めても、すぐに起き上がれない。\n布団の中で「もう少しだけ…」がいつも続く。",
    ask: "朝の体の重さや倦怠感を感じますか？",
    female: false,
    scores: { 気虚:2, 陽虚:2, 志:2 }
  },
  {
    block: "BLOCK A — からだの声",
    empathy: "食事のあと、急に眠くなる。\nまたは体がずしっと重くなる。",
    ask: "食後の疲れやだるさを感じますか？",
    female: false,
    scores: { 気虚:2, 湿痰:1, 意:2 }
  },
  {
    block: "BLOCK A — からだの声",
    empathy: "手足の先が冷たい。\n特に寝るとき、足が冷えてなかなか眠れない。",
    ask: "慢性的な冷えを感じますか？",
    female: false,
    scores: { 陽虚:3, 血虚:1, 志:2 }
  },
  {
    block: "BLOCK A — からだの声",
    empathy: "夜中や明け方に目が覚める。\nそのあと、なかなか眠れない。",
    ask: "眠りが浅く、休めた感じがしませんか？",
    female: false,
    scores: { 陰虚:2, 血虚:1, 神:2 }
  },
  {
    block: "BLOCK A — からだの声",
    empathy: "肩や首がいつもこっている。\n気づくと、歯を食いしばっていることがある。",
    ask: "体の緊張や痛みが慢性的に続いていますか？",
    female: false,
    scores: { 気滞:2, 血瘀:1, 魂:2 }
  },
  {
    block: "BLOCK A — からだの声",
    empathy: "顔色が青白い、くすんでいると言われる。\n唇の色が薄い。",
    ask: "血色の悪さや貧血のような感覚がありますか？",
    female: false,
    scores: { 血虚:3, 血瘀:1, 神:2 }
  },
  {
    block: "BLOCK A — からだの声",
    empathy: "水を飲んでも、口や喉の渇きが\nなかなか癒えない感じがある。",
    ask: "体の乾きや潤いのなさを感じますか？",
    female: false,
    scores: { 陰虚:3, 神:1, 魄:1 }
  },

// 状態管理

let currentQ = 0;
let answers = {};

const taishitsuKeys = ['気虚','気滞','血虚','血瘀','陰虚','陽虚','湿痰','湿熱'];
const goshinKeys = ['神','魂','魄','意','志'];

function startDiagnosis() {
  showScreen('screen-quiz');
  currentQ = 0;
  answers = {};
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;

  // プログレス
  document.getElementById('progress-count').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((currentQ) / total) * 100}%`;

  // ブロックバッジ
  document.getElementById('block-badge').textContent = q.block;

  // 質問文
  document.getElementById('q-empathy').textContent = q.empathy;
  document.getElementById('q-ask').textContent = q.ask;

  // 女性専用
  document.getElementById('female-note').style.display = q.female ? 'block' : 'none';

  // 選択肢
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    if (answers[currentQ] === opt.value) btn.classList.add('selected');

    btn.innerHTML = `<span class="option-dot"></span>${opt.label}`;
    btn.addEventListener('click', () => {
      answers[currentQ] = opt.value;
      grid.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('btn-next').disabled = false;
    });
    grid.appendChild(btn);
  });

  // ボタン状態
  document.getElementById('btn-back').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').disabled = answers[currentQ] === undefined;
  document.getElementById('btn-next').textContent = currentQ === total - 1 ? '結果を見る ✦' : '次へ ▷';
}

function nextQuestion() {
  if (answers[currentQ] === undefined) return;

  if (currentQ < questions.length - 1) {
    currentQ++;
    animateCard('next');
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    animateCard('prev');
  }
}

function animateCard(dir) {
  const card = document.getElementById('question-card');
  card.style.animation = dir === 'next'
    ? 'slideOut 0.25s ease forwards'
    : 'slideIn 0.25s ease forwards';
  setTimeout(() => {
    renderQuestion();
    card.style.animation = dir === 'next'
      ? 'slideIn 0.3s ease forwards'
      : 'slideOut 0.3s ease forwards';
  }, 250);
}

// ══════════════════════════════════════════
// スコア計算
// ══════════════════════════════════════════
function calcScores() {
  const taishitsu = {};
  const goshin = {};
  taishitsuKeys.forEach(k => taishitsu[k] = 0);
  goshinKeys.forEach(k => goshin[k] = 0);

  questions.forEach((q, i) => {
    const val = answers[i] ?? 0;
    if (val === 0) return;
    Object.entries(q.scores).forEach(([key, weight]) => {
      if (taishitsuKeys.includes(key)) taishitsu[key] += val * weight;
      if (goshinKeys.includes(key)) goshin[key] += val * weight;
    });
  });

  return { taishitsu, goshin };
}

  showScreen('screen-result');
  const { taishitsu, goshin } = calcScores();

  // 体質TOP3
  const sortedT = Object.entries(taishitsu).sort((a,b) => b[1]-a[1]);
  const maxT = sortedT[0][1] || 1;
  const top3 = sortedT.slice(0, 3);

  const tDiv = document.getElementById('taishitsu-results');
  tDiv.innerHTML = '';
  const rankLabels = ['一', '二', '三'];

  top3.forEach(([type, score], i) => {
    const info = taishitsuInfo[type];
    const pct = Math.round((score / maxT) * 100);
    const div = document.createElement('div');
    div.className = 'rank-card';
    div.onclick = () => { if(info.url) window.open(info.url, '_blank'); };
    div.innerHTML = `
      <div class="rank-num ${i===0?'first':i===1?'second':'third'}">${rankLabels[i]}</div>
      <div class="rank-info">
        <div class="rank-type">${info.emoji} ${type}タイプ</div>
        <div class="rank-desc">${info.desc}</div>
      </div>
      <div class="rank-bar-wrap">
        <div class="rank-score-label">${pct}%</div>
        <div class="rank-bar-bg">
          <div class="rank-bar-fill ${i===0?'first':''}" style="height:${pct}%"></div>
        </div>
      </div>
    `;
    tDiv.appendChild(div);
  });

  // 五神TOP2
  const sortedG = Object.entries(goshin).sort((a,b) => b[1]-a[1]);

      <div>
        <div class="goshin-name">${type}（${type === '神' ? 'しん' : type === '魂' ? 'こん' : type === '魄' ? 'はく' : type === '意' ? 'い' : 'し'}）</div>
        <div class="goshin-organ">${info.organ}</div>
        <div class="goshin-desc">${info.desc}</div>
      </div>
    `;
    gDiv.appendChild(div);
  });

  // メッセージ
  const t1 = top3[0][0];

    気虚: "今のあなたのからだは、エネルギーを補う時期にあります。",

    湿痰: "今のあなたのからだは、余分なものを手放す時期にあります。",

    神: "こころの中心である「神」が揺れています。まず、深い休息を。",

  document.getElementById('btn-detail2').textContent = `${top3[1][0]}タイプについて詳しく見る →`;
  document.getElementById('btn-detail2').href = taishitsuInfo[top3[1][0]].url;
}

function resetDiagnosis() {
  currentQ = 0;
  answers = {};
  showScreen('screen-start');
